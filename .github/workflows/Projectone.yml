name: TestWorkflow_01

on:
  schedule:
    - cron: '33 3-15/1 * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Schedule Heartbeat
        run: |
          # Set the timezone to IST and print the current time
          export TZ="Asia/Kolkata"
          echo "Heartbeat: Workflow triggered at $(date +'%Y-%m-%d %H:%M:%S') IST"

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Run Selenium Scraper
        run: mvn compile exec:java -D"exec.mainClass"="org.testing.Main"
        env:
          USER_ID: ${{ secrets.user_email }}
          USER_PASS: ${{ secrets.user_pass }}
          CHROME_OPTIONS: "--headless --disable-gpu --no-sandbox"
